name: CI/CD - PA Service (Hetzner)

on:
  push:
    branches: [ main ]
    tags:
      - 'pa-v*'
    paths:
      - 'bagile-pa-service/**'
      - '.github/workflows/cicd-pa-hetzner.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test
        working-directory: bagile-pa-service
        run: |
          npm ci
          npm test

      - name: Extract version from tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="pa-dev-${GITHUB_SHA::7}"
          fi
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push PA service image
        uses: docker/build-push-action@v6
        with:
          context: ./bagile-pa-service
          file: ./bagile-pa-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bagile-pa:${{ steps.vars.outputs.version }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('ghcr.io/{0}/bagile-pa:latest', github.repository_owner) || format('ghcr.io/{0}/bagile-pa:dev', github.repository_owner) }}

  deploy-to-hetzner:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/pa-v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy PA service via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DATABASE_URL: ${{ secrets.DB_CONNECTION_STRING }}
          PA_API_KEYS: ${{ secrets.PA_API_KEYS }}
          PA_ENCRYPTION_KEY: ${{ secrets.PA_ENCRYPTION_KEY }}
          PA_CORS_ORIGINS: ${{ vars.PA_CORS_ORIGINS }}
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_PAT,DATABASE_URL,PA_API_KEYS,PA_ENCRYPTION_KEY,PA_CORS_ORIGINS
          script: |
            cd /opt/bagile

            echo "Refreshing GHCR credentials on Hetzner..."
            echo "${GHCR_PAT}" | docker login ghcr.io -u asbrown77 --password-stdin

            echo "Pulling latest repo (docker-compose and config)..."
            git pull origin main

            echo "Writing PA service env file..."
            mkdir -p config
            cat > config/pa.env <<EOF
            DATABASE_URL=${DATABASE_URL}
            PA_HTTP_PORT=3001
            PA_API_KEYS=${PA_API_KEYS}
            PA_ENCRYPTION_KEY=${PA_ENCRYPTION_KEY}
            PA_CORS_ORIGINS=${PA_CORS_ORIGINS}
            EOF

            echo "Pulling latest PA service image..."
            docker compose pull bagile-pa

            echo "Recreating PA service container..."
            docker compose up -d bagile-pa

            echo "Cleaning unused images..."
            docker system prune -f
