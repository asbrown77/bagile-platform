name: Debug - PA container status

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check PA container on Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "=== docker ps ==="
            docker ps --filter name=bagile-pa

            echo "=== docker inspect networks ==="
            docker inspect bagile-pa --format '{{json .NetworkSettings.Networks}}' 2>/dev/null || echo "container not found"

            echo "=== docker logs (last 50 lines) ==="
            docker logs bagile-pa --tail 50 2>&1

            echo "=== port check ==="
            ss -tlnp | grep 3001 || echo "nothing on 3001"

            echo "=== cat config/pa.env ==="
            cd /opt/bagile && cat config/pa.env | sed 's/=.*/=REDACTED/'

            echo "=== curl from bagile-api to bagile-pa ==="
            docker exec bagile-api curl -sv http://bagile-pa:3001/health 2>&1 || echo "curl failed"

            echo "=== bagile-net members ==="
            docker network inspect bagile-net --format '{{range .Containers}}{{.Name}} {{.IPv4Address}}{{"\n"}}{{end}}'

            echo "=== curl PA health from host ==="
            curl -s http://172.18.0.6:3001/health || echo "host->pa direct failed"

            echo "=== cat api.env (redacted) ==="
            cd /opt/bagile && cat config/api.env | sed 's/=.*/=REDACTED/'

            echo "=== docker logs bagile-api (last 20) ==="
            docker logs bagile-api --tail 20 2>&1

            echo "=== restarting bagile-api to clear stale HttpClient DNS cache ==="
            docker restart bagile-api
            echo "restarted"
