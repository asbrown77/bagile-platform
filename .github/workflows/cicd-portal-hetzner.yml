name: CI/CD - Portal (Hetzner)

on:
  push:
    branches: [ main ]
    tags:
      - 'portal-v*'
    paths:
      - 'bagile-portal/**'
      - '.github/workflows/cicd-portal-hetzner.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="portal-vdev-${GITHUB_SHA::7}"
          fi
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Portal Image
        uses: docker/build-push-action@v6
        with:
          context: ./bagile-portal
          file: bagile-portal/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_API_URL=https://api.bagile.co.uk
          tags: |
            ghcr.io/${{ github.repository_owner }}/bagile-portal:latest
            ghcr.io/${{ github.repository_owner }}/bagile-portal:${{ steps.vars.outputs.version }}

  deploy-to-hetzner:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/portal-v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        env:
          PORTAL_GOOGLE_CLIENT_ID: ${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
          PORTAL_JWT_SECRET: ${{ secrets.PORTAL_JWT_SECRET }}
          PORTAL_ALLOWED_EMAILS: ${{ secrets.PORTAL_ALLOWED_EMAILS }}
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: PORTAL_GOOGLE_CLIENT_ID,PORTAL_JWT_SECRET,PORTAL_ALLOWED_EMAILS
          script: |
            # Restore git repo if corrupted
            cd /opt/bagile
            if [ ! -d .git ]; then
              echo "Git repo missing — restoring..."
              cd /opt
              mv bagile bagile-backup 2>/dev/null || true
              git clone https://github.com/asbrown77/bagile-platform.git bagile
              cd bagile
              cp -r ../bagile-backup/config ./config 2>/dev/null || true
              rm -rf ../bagile-backup
            else
              git fetch origin
              git reset --hard origin/main
            fi
            mkdir -p config

            echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${PORTAL_GOOGLE_CLIENT_ID}" > config/portal.env
            echo "NEXT_PUBLIC_API_URL=https://api.bagile.co.uk" >> config/portal.env

            if ! grep -q "Portal__GoogleClientId" config/api.env 2>/dev/null; then
              echo "" >> config/api.env
              echo "Portal__GoogleClientId=${PORTAL_GOOGLE_CLIENT_ID}" >> config/api.env
              echo "Portal__JwtSecret=${PORTAL_JWT_SECRET}" >> config/api.env
              echo "Portal__AllowedEmails=${PORTAL_ALLOWED_EMAILS}" >> config/api.env
            fi

            cp -f docker-compose.prod.yml docker-compose.yml

            # Diagnose and fix reverse proxy
            echo "=== Docker networks ==="
            docker network ls
            echo "=== Running containers ==="
            docker ps --format '{{.Names}} {{.Ports}} {{.Networks}}'
            echo "=== Proxy config ==="
            cat /etc/caddy/Caddyfile 2>/dev/null || cat /etc/nginx/sites-enabled/* 2>/dev/null || echo "No proxy config found"
            echo "=== Docker compose config ==="
            cat docker-compose.yml

            docker pull ghcr.io/asbrown77/bagile-portal:latest
            docker compose up -d bagile-portal
            docker compose up -d bagile-api

            echo "=== After restart ==="
            docker ps --format '{{.Names}} {{.Ports}} {{.Networks}}'

            docker system prune -f
