name: CI/CD - Portal (Hetzner)

on:
  push:
    branches: [ main ]
    tags:
      - 'portal-v*'
    paths:
      - 'bagile-portal/**'
      - '.github/workflows/cicd-portal-hetzner.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="portal-vdev-${GITHUB_SHA::7}"
          fi
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Portal Image
        uses: docker/build-push-action@v6
        with:
          context: ./bagile-portal
          file: bagile-portal/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_API_URL=https://api.bagile.co.uk
          tags: |
            ghcr.io/${{ github.repository_owner }}/bagile-portal:latest
            ghcr.io/${{ github.repository_owner }}/bagile-portal:${{ steps.vars.outputs.version }}

  deploy-to-hetzner:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/portal-v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        env:
          PORTAL_GOOGLE_CLIENT_ID: ${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
          PORTAL_JWT_SECRET: ${{ secrets.PORTAL_JWT_SECRET }}
          PORTAL_ALLOWED_EMAILS: ${{ secrets.PORTAL_ALLOWED_EMAILS }}
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: PORTAL_GOOGLE_CLIENT_ID,PORTAL_JWT_SECRET,PORTAL_ALLOWED_EMAILS
          script: |
            cd /opt/bagile
            git pull origin main
            mkdir -p config

            echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=${PORTAL_GOOGLE_CLIENT_ID}" > config/portal.env
            echo "NEXT_PUBLIC_API_URL=https://api.bagile.co.uk" >> config/portal.env

            if ! grep -q "Portal__GoogleClientId" config/api.env 2>/dev/null; then
              echo "" >> config/api.env
              echo "Portal__GoogleClientId=${PORTAL_GOOGLE_CLIENT_ID}" >> config/api.env
              echo "Portal__JwtSecret=${PORTAL_JWT_SECRET}" >> config/api.env
              echo "Portal__AllowedEmails=${PORTAL_ALLOWED_EMAILS}" >> config/api.env
            fi

            # Fix corrupted docker-compose: remove bad portal entry, add clean one
            sed -i '/bagile-portal/,/env_file/{/bagile-portal/d;/container_name.*portal/d;/bagile-portal/d;/3100/d;/portal\.env/d;/env_file/d}' docker-compose.yml 2>/dev/null
            if ! grep -q "bagile-portal" docker-compose.yml 2>/dev/null; then
              sed -i '/^services:/a\  bagile-portal:\n    container_name: bagile-portal\n    image: ghcr.io/asbrown77/bagile-portal:latest\n    restart: unless-stopped\n    ports:\n      - "3100:3000"\n    env_file:\n      - config/portal.env' docker-compose.yml
            fi

            docker pull ghcr.io/asbrown77/bagile-portal:latest
            docker compose up -d bagile-portal
            docker compose up -d bagile-api
            docker system prune -f
