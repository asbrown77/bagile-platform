name: CI/CD - API (Hetzner)

on:
  push:
    branches: [ main ]
    tags:
      - 'api-v*'
    paths:
      - 'Bagile/Bagile.Api/**'
      - 'Bagile/Bagile.Infrastructure/**'
      - '.github/workflows/cicd-api-hetzner.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # strip prefix to get semver only (e.g. 1.2.6)
            CLEAN_TAG=$(echo "$TAG" | sed 's/^api-v//')
          else
            TAG="api-vdev-${GITHUB_SHA::7}"
            CLEAN_TAG="0.0.0"
          fi
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "semver=${CLEAN_TAG}" >> $GITHUB_OUTPUT

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Bagile/Bagile.sln

      - name: Build
        run: dotnet build Bagile/Bagile.sln -c Release --no-restore

      - name: Test
        run: dotnet test Bagile/Tests/Bagile.UnitTests -c Release --no-build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Bagile/Bagile.Api/Dockerfile
          push: true
          # .NET gets semver (1.2.6), Docker tags keep prefix (api-v1.2.6)
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.semver }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bagile-api:${{ steps.vars.outputs.version }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('ghcr.io/{0}/bagile-api:latest', github.repository_owner) || format('ghcr.io/{0}/bagile-api:dev', github.repository_owner) }}

  deploy-to-hetzner:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/api-v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          BAGILE_API_KEY: ${{ secrets.BAGILE_API_KEY }}
          WOOCOMMERCE_WEBHOOK_SECRET: ${{ secrets.WOOCOMMERCE_WEBHOOK_SECRET }}
          WOOCOMMERCE_CONSUMER_KEY: ${{ secrets.WOOCOMMERCE_CONSUMER_KEY }}
          WOOCOMMERCE_CONSUMER_SECRET: ${{ secrets.WOOCOMMERCE_CONSUMER_SECRET }}
          PA_API_KEYS: ${{ secrets.PA_API_KEYS }}
          PA_ENCRYPTION_KEY: ${{ secrets.PA_ENCRYPTION_KEY }}
          XERO_WEBHOOK_SECRET: ${{ secrets.XERO_WEBHOOK_SECRET }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          PORTAL_GOOGLE_CLIENT_ID: ${{ secrets.PORTAL_GOOGLE_CLIENT_ID }}
          PORTAL_JWT_SECRET: ${{ secrets.PORTAL_JWT_SECRET }}
          PORTAL_ALLOWED_EMAILS: ${{ secrets.PORTAL_ALLOWED_EMAILS }}
          HETZNER_HOST: ${{ vars.HETZNER_HOST }}
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_PAT,DB_CONNECTION_STRING,BAGILE_API_KEY,WOOCOMMERCE_WEBHOOK_SECRET,WOOCOMMERCE_CONSUMER_KEY,WOOCOMMERCE_CONSUMER_SECRET,PA_API_KEYS,PA_ENCRYPTION_KEY,XERO_WEBHOOK_SECRET,SMTP_PASSWORD,PORTAL_GOOGLE_CLIENT_ID,PORTAL_JWT_SECRET,PORTAL_ALLOWED_EMAILS,HETZNER_HOST
          script: |
            cd /opt/bagile

            echo "Refreshing GHCR credentials on Hetzner..."
            echo "${GHCR_PAT}" | docker login ghcr.io -u asbrown77 --password-stdin

            echo "Pulling latest repo (docker-compose and config)..."
            git pull origin main

            echo "Ensuring config directory exists..."
            mkdir -p config

            echo "Writing API env file from GitHub secrets..."
            # Extract the raw key (first segment before ':') from PA_API_KEYS
            PA_INTERNAL_KEY=$(echo "${PA_API_KEYS}" | cut -d',' -f1 | cut -d':' -f1)
            cat > config/api.env <<EOF
            ASPNETCORE_ENVIRONMENT=Production
            ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}

            ApiKey=${BAGILE_API_KEY}

            WooCommerce__WebhookSecret=${WOOCOMMERCE_WEBHOOK_SECRET}
            WooCommerce__ConsumerKey=${WOOCOMMERCE_CONSUMER_KEY}
            WooCommerce__ConsumerSecret=${WOOCOMMERCE_CONSUMER_SECRET}

            PA_ENCRYPTION_KEY=${PA_ENCRYPTION_KEY}
            PaService__BaseUrl=http://bagile-pa:3001
            PaService__ApiKey=${PA_INTERNAL_KEY}

            Xero__WebhookSecret=${XERO_WEBHOOK_SECRET}

            Smtp__Host=smtp.gmail.com
            Smtp__Port=587
            Smtp__User=info@bagile.co.uk
            Smtp__Pass=${SMTP_PASSWORD}
            Smtp__From=info@bagile.co.uk

            Portal__GoogleClientId=${PORTAL_GOOGLE_CLIENT_ID}
            Portal__JwtSecret=${PORTAL_JWT_SECRET}
            Portal__AllowedEmails=${PORTAL_ALLOWED_EMAILS}
            EOF

            echo "Pulling latest API image..."
            docker compose -f docker-compose.prod.yml pull bagile-api

            echo "Recreating API container..."
            docker compose -f docker-compose.prod.yml up -d bagile-api

            echo "=== PA CONNECTIVITY DIAGNOSTICS ==="
            sleep 3

            echo "-- bagile-pa network IPs --"
            docker inspect bagile-pa --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}={{$v.IPAddress}} {{end}}'

            echo "-- bagile-api network IPs --"
            docker inspect bagile-api --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}={{$v.IPAddress}} {{end}}'

            PA_IP=$(docker inspect bagile-pa --format '{{(index .NetworkSettings.Networks "bagile-net").IPAddress}}')
            echo "PA bagile-net IP: ${PA_IP}"

            echo "-- PA container listening ports (via /proc/net/tcp6) --"
            docker exec bagile-pa sh -c "cat /proc/net/tcp6 | awk 'NR==1 || /0BC1/'" 2>&1 || echo "/proc/net/tcp6 unavailable"

            echo "-- From HOST: curl to PA container IP directly --"
            curl -s --max-time 5 http://${PA_IP}:3001/health 2>&1 || echo "HOST->container IP failed: $?"

            echo "-- From HOST: curl to localhost:3001 (docker-proxy) --"
            curl -s --max-time 5 http://localhost:3001/health 2>&1 || echo "HOST->localhost failed: $?"

            echo "-- From API container: curl to bagile-pa:3001 --"
            docker exec bagile-api curl -sv --max-time 5 http://bagile-pa:3001/health 2>&1 || echo "API->bagile-pa failed: $?"

            echo "-- From API container: curl to PA IP directly (${PA_IP}:3001) --"
            docker exec bagile-api curl -sv --max-time 5 http://${PA_IP}:3001/health 2>&1 || echo "API->PA_IP failed: $?"

            echo "-- From API container: curl to bridge gw 172.18.0.1:3001 --"
            docker exec bagile-api curl -sv --max-time 5 http://172.18.0.1:3001/health 2>&1 || echo "API->bridge-gw failed: $?"

            echo "-- Host userland proxy status --"
            ps aux | grep docker-proxy | grep -v grep || echo "No docker-proxy processes"

            echo "-- iptables DOCKER chain (port 3001) --"
            iptables -L DOCKER -n -v 2>/dev/null | grep -E "3001|Chain" || echo "No DOCKER rules for 3001"

            echo "-- iptables FORWARD chain (container subnets) --"
            iptables -L FORWARD -n -v 2>/dev/null | head -40

            echo "-- iptables DOCKER-USER chain --"
            iptables -L DOCKER-USER -n -v 2>/dev/null || echo "No DOCKER-USER chain"

            echo "-- Docker daemon icc setting --"
            docker info 2>/dev/null | grep -i "icc\|ICC" || echo "icc not shown in docker info"

            echo "=== END DIAGNOSTICS ==="

            echo "Cleaning unused images..."
            docker system prune -f
